name: Build book

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'manuscript/**'
      - 'index.md'
      - '_quarto.yml'
      - 'images/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render PDF (Typst) and EPUB
        run: quarto render

      - name: Upload built book
        uses: actions/upload-artifact@v4
        with:
          name: the-automatic-business-build
          path: |
            _build/*.pdf
            _build/*.epub
          if-no-files-found: error
          retention-days: 30
