name: Build book

# Manual trigger only: Shockwave syncs commit every few seconds while editing,
# which fired a build per commit. Run from the Actions tab (Run workflow button),
# or ask Claude to trigger it.
on:
  workflow_dispatch:

concurrency:
  group: build-book
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # Fetch the freely-embeddable design fonts into ./fonts before rendering,
      # so the interior uses Source Serif 4 / Archivo rather than Typst's
      # bundled fallback faces. The fonts are not committed to the repo.
      - name: Fetch design fonts
        run: bash fonts/download.sh

      - name: Render PDF (Typst) and EPUB
        run: quarto render

      - name: Upload built book
        uses: actions/upload-artifact@v4
        with:
          name: the-automatic-business-build
          path: |
            _build/*.pdf
            _build/*.epub
          if-no-files-found: error
          retention-days: 30
