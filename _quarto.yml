project:
  type: book
  output-dir: _build

book:
  title: "The Automatic Business"
  subtitle: "Do What Only You Can Do"
  author: "Jake Liddell"
  chapters:
    - index.md
    - manuscript/foreword.md
    - manuscript/introduction.md
    - part: "Part One: Why You're the Bottleneck"
      chapters:
        - manuscript/01-you-are-the-bottleneck.md
        - manuscript/02-technician-to-architect.md
    - part: "Part Two: Human, Automation, or AI"
      chapters:
        - manuscript/03-the-triage.md
        - manuscript/04-ai-is-not-automation.md
        - manuscript/05-your-brilliant-new-hire.md
        - manuscript/06-where-to-start.md
    - part: "Part Three: Building the Automatic Business"
      chapters:
        - manuscript/07-second-brain-concept.md
        - manuscript/08-second-brain-build.md
        - manuscript/09-connecting-everything.md
        - manuscript/10-client-operating-system.md
        - manuscript/11-killing-errors.md
        - manuscript/12-communications.md
        - manuscript/13-digital-teammates.md
        - manuscript/14-dashboards.md
    - part: "Part Four: The Business That Runs Without You"
      chapters:
        - manuscript/15-systemising-delivery.md
        - manuscript/16-marketing-growth.md

format:
  pdf:
    documentclass: scrbook
    fontsize: 11pt
    geometry:
      - paperwidth=6in
      - paperheight=9in
      - inner=0.875in
      - outer=0.5in
      - top=0.75in
      - bottom=0.6in
  epub:
    toc: true
