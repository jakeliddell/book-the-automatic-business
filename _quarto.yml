project:
  type: book
  output-dir: _build

book:
  title: "The Automatic Business"
  subtitle: "Do What Only You Can Do"
  author: "Jake Liddell"
  chapters:
    - index.md
    - manuscript/copyright.md
    - manuscript/come-to-the-edge.md
    - manuscript/foreword.md
    - manuscript/introduction.md
    - part: "Part One: Why You're the Bottleneck"
      chapters:
        - manuscript/01-you-are-the-bottleneck.md
        - manuscript/02-technician-to-architect.md
    - part: "Part Two: Human, Automation, or AI"
      chapters:
        - manuscript/03-the-triage.md
        - manuscript/04-ai-is-not-automation.md
        - manuscript/05-your-brilliant-new-hire.md
        - manuscript/06-where-to-start.md
        - manuscript/intermission.md
    - part: "Part Three: Building the Automatic Business"
      chapters:
        - manuscript/07-the-map-of-your-business.md
        - manuscript/08-second-brain-concept.md
        - manuscript/09-second-brain-build.md
        - manuscript/10-connecting-everything.md
        - manuscript/11-client-operating-system.md
        - manuscript/12-killing-errors.md
        - manuscript/13-communications.md
        - manuscript/14-digital-teammates.md
        - manuscript/15-dashboards.md
    - part: "Part Four: The Business That Runs Without You"
      chapters:
        - manuscript/16-systemising-delivery.md
        - manuscript/17-marketing-growth.md
        - manuscript/18-buying-back-time.md
        - manuscript/19-everything-is-not-a-priority.md
        - manuscript/20-maintaining.md
    - manuscript/afterword.md
    - manuscript/tools-pullout.md
    - manuscript/back-cover.md

# Numbered chapters give us "Chapter Three" openers and "Figure 3.1" figure
# numbers. Front-matter files carry {.unnumbered} in their own H1 already.
number-sections: true
number-depth: 1

crossref:
  fig-title: "Figure"
  fig-prefix: "Figure"

format:
  # ---------------------------------------------------------------------------
  # PRINT — Typst. Interior design lives in the two partials below.
  # Page size, mirrored margins, fonts and all styling are set inside the
  # template (see typst-template.typ / brand.typ), NOT here — so this block
  # stays intentionally small. Builds with a plain `quarto render`.
  # ---------------------------------------------------------------------------
  typst:
    template-partials:
      - typst-template.typ
      - typst-show.typ
    font-paths:
      - fonts
    toc: true

  # ---------------------------------------------------------------------------
  # SCREEN — EPUB. Echoes the print design; the ONLY place the terracotta
  # accent is applied.
  # ---------------------------------------------------------------------------
  epub:
    toc: true
    css: styles/epub.css
