<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 820 280' font-family='sans-serif'>
  <rect width='820' height='280' fill='#F7F5F1'/>
  <line x1='70' y1='150' x2='742' y2='150' stroke='#2A2A28' stroke-width='2'/>
  <polygon points='752,150 738,143 738,157' fill='#2A2A28'/>
  <g fill='#B5632F'>
    <circle cx='150' cy='150' r='7'/>
    <circle cx='400' cy='150' r='7'/>
    <circle cx='620' cy='150' r='7'/>
  </g>
  <g text-anchor='middle' font-size='13' fill='#2A2A28'>
    <text x='150' y='96'>instant, personal</text>
    <text x='150' y='114'>acknowledgement</text>
    <text x='400' y='96'>a warm reminder</text>
    <text x='400' y='114'>the day before</text>
    <text x='620' y='96'>a gentle nudge</text>
    <text x='620' y='114'>if they go quiet</text>
  </g>
  <g stroke='#B5632F' stroke-width='1.5'>
    <line x1='150' y1='124' x2='150' y2='143'/>
    <line x1='400' y1='124' x2='400' y2='143'/>
    <line x1='620' y1='124' x2='620' y2='143'/>
  </g>
  <g text-anchor='middle' font-size='12' fill='#7A756B'>
    <text x='150' y='178'>they enquire</text>
    <text x='400' y='178'>before the call</text>
    <text x='620' y='178'>follow-up</text>
  </g>
  <text x='410' y='240' text-anchor='middle' font-size='14' fill='#2A2A28'>the right message, at the right moment, that stops the instant they reply</text>
</svg>
